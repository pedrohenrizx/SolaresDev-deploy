<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FluxoAgil - Manager Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-blue-600 text-white p-4 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">FluxoAgil</h1>
      <div>
        <a href="index.html" class="px-3 hover:underline font-bold">Dashboard</a>
        <a href="professional.html" class="px-3 hover:underline">Professional App</a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto p-4 mt-6">
    <h2 class="text-2xl font-semibold mb-4">Manager Dashboard</h2>

    <section class="bg-white p-6 rounded shadow-md mb-8">
      <h3 class="text-xl font-bold mb-4 text-red-600">Scale Health Alerts</h3>
      <p class="text-gray-600 mb-4">Shifts unassigned in the next 24 hours.</p>
      <div id="alerts-container" class="space-y-4">
        <!-- Rendered via JS -->
      </div>
    </section>

    <section class="bg-white p-6 rounded shadow-md">
      <h3 class="text-xl font-bold mb-4 text-blue-600">Pending Exchange Requests</h3>
      <div id="exchanges-container" class="space-y-4">
        <!-- Rendered via JS -->
      </div>
    </section>
  </main>

  <script src="js/dashboard.js"></script>
</body>
</html>
