<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FluxoAgil - Professional App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-blue-600 text-white p-4 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">FluxoAgil App</h1>
      <div>
        <a href="index.html" class="px-3 hover:underline">Dashboard</a>
        <a href="professional.html" class="px-3 hover:underline font-bold">Professional App</a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto p-4 mt-6">
    <h2 class="text-2xl font-semibold mb-4">My Shifts</h2>

    <div class="mb-4">
      <label for="user-select" class="block text-gray-700 font-bold mb-2">Simulate Login As:</label>
      <select id="user-select" class="block w-full bg-white border border-gray-300 rounded py-2 px-3 focus:outline-none focus:ring focus:border-blue-300">
        <!-- Rendered via JS -->
      </select>
    </div>

    <section class="bg-white p-6 rounded shadow-md mb-8">
      <h3 class="text-xl font-bold mb-4 text-blue-600">My Schedule</h3>
      <div id="my-shifts-container" class="space-y-4">
        <!-- Rendered via JS -->
      </div>
    </section>

    <section class="bg-white p-6 rounded shadow-md">
      <h3 class="text-xl font-bold mb-4 text-green-600">Marketplace - Available Shifts</h3>
      <div id="marketplace-container" class="space-y-4">
        <!-- Rendered via JS -->
      </div>
    </section>
  </main>

  <script src="js/professional.js"></script>
</body>
</html>
